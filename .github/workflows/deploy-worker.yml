name: Deploy worker

on:
  push:
    branches: [main, prod]
    paths:
      - "worker/**"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Télécharger le repo
        uses: actions/checkout@v4

      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Choisir l'environnement (main -> preprod, prod -> production)
        id: pick
        run: |
          if [ "${{ github.ref_name }}" = "prod" ]; then
            echo "env=production" >> "$GITHUB_OUTPUT"
          else
            echo "env=preprod" >> "$GITHUB_OUTPUT"
          fi

      - name: Déployer sur Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy --env ${{ steps.pick.outputs.env }}

      # Provisionne les secrets du Worker depuis les secrets GitHub (apres le deploy
      # pour que le Worker existe). Idempotent : rejoue a chaque deploiement.
      - name: Provisionner les secrets du Worker
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          printf '%s' "$API_FOOTBALL_KEY" | npx wrangler secret put API_FOOTBALL_KEY --env ${{ steps.pick.outputs.env }}
          printf '%s' "$SYNC_TOKEN" | npx wrangler secret put SYNC_TOKEN --env ${{ steps.pick.outputs.env }}
