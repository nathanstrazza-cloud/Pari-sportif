name: Deploy worker

on:
  push:
    branches: [main, prod]
    paths:
      - "worker/**"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Télécharger le repo
        uses: actions/checkout@v4

      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Choisir l'environnement (main -> preprod, prod -> production)
        id: pick
        run: |
          if [ "${{ github.ref_name }}" = "prod" ]; then
            echo "env=production" >> "$GITHUB_OUTPUT"
          else
            echo "env=preprod" >> "$GITHUB_OUTPUT"
          fi

      - name: Déployer sur Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy --env ${{ steps.pick.outputs.env }}
        # La cle API_FOOTBALL_KEY est un secret du Worker, defini une fois par
        # environnement (dashboard Cloudflare) ; elle survit aux redeploiements.
