name: Update data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Télécharger le repo
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lancer les scripts de mise à jour
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          python scripts/morning_world_cup_sync.py --force-today

      - name: Sauvegarder les fichiers modifiés
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/matches.json data/odds.json data/players-ea.json data/standings.json data/today-kickoffs.json
          git commit -m "Update live data" || echo "Aucune modification"
          git push
