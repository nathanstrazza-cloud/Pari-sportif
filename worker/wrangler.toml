main = "src/index.ts"
compatibility_date = "2024-09-23"

# Ce Worker tourne en DEUX environnements isoles (preprod / production), chacun
# avec son propre Worker, son propre KV et ses propres origines CORS.
# Deploiement : wrangler deploy --env preprod  |  wrangler deploy --env production
# Secret par env :  wrangler secret put API_FOOTBALL_KEY --env preprod  (et --env production)

# ─────────────────────────── PREPROD ───────────────────────────
# Pas de cron : la preprod ne se rafraichit PAS toute seule.
# Les donnees y sont poussees a la demande (workflow "Update data" -> Run -> target=preprod).
[env.preprod]
name = "coteadede-preprod"

[[env.preprod.kv_namespaces]]
binding = "MATCHES"
id = "a578656234d14cd4881434237132adf9"

[[env.preprod.ratelimits]]
binding = "RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 120, period = 60 }

[env.preprod.ai]
binding = "AI"

[env.preprod.vars]
WORLD_CUP_LEAGUE = "1"
WORLD_CUP_SEASON = "2026"
RESEED_HOUR_UTC = "11"
ALLOWED_ORIGINS = "https://nathanstrazza-cloud.github.io,https://preprod.lacoteadede.fr"

# ─────────────────────────── PRODUCTION ───────────────────────────
[env.production]
name = "coteadede-prod"

[env.production.triggers]
crons = ["* * * * *"]

[[env.production.kv_namespaces]]
binding = "MATCHES"
id = "4c1f09b763aa43bc9270618be72d3d8f"

[[env.production.ratelimits]]
binding = "RATE_LIMITER"
namespace_id = "1002"
simple = { limit = 120, period = 60 }

[env.production.ai]
binding = "AI"

[env.production.vars]
WORLD_CUP_LEAGUE = "1"
WORLD_CUP_SEASON = "2026"
RESEED_HOUR_UTC = "11"
ALLOWED_ORIGINS = "https://lacoteadede.fr,https://www.lacoteadede.fr"
